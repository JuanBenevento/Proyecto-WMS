# =============================================================================
# WMS - Base Configuration
# =============================================================================
# NO DEPLOYAR ESTE ARCHIVO DIRECTAMENTE - USAR PROFILES
# =============================================================================

# =============================================================================
# Schema-Based Multi-Tenant Isolation Configuration
# =============================================================================
# Feature flags para aislamiento basado en esquemas PostgreSQL
#
# wms.tenant.isolation.enabled: Habilita/deshabilita aislamiento por esquema
#   - true: Usa search_path por tenant (aislamiento fuerte)
#   - false: Usa filtro Hibernate legacy (soft isolation)
#
# wms.tenant.isolation.rls.enabled: Habilita Row-Level Security
#   - true: RLS activo en todas las tablas de tenant
#   - false: Solo aislamiento por search_path
#
# wms.tenant.schema.prefix: Prefijo para nombres de esquemas
#   - Default: "tenant_"
#   - Formato final: tenant_{tenantId}
# =============================================================================
wms.tenant.isolation.enabled=${WMS_TENANT_ISOLATION_ENABLED:false}
wms.tenant.isolation.rls.enabled=${WMS_TENANT_RLS_ENABLED:false}
wms.tenant.schema.prefix=tenant_

# Connection Pool Configuration for Schema Isolation
# search_path se resetea en cada connection checkout
spring.datasource.hikari.initial-size=5
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/wms_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration (default: update - crea tablas si no existen, no borra datos)
# Cambiar a create-drop solo si quieres recrear el schema
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Migration Configuration
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# JWT Security
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

# =============================================================================
# PROFILES DISPONIBLES
# =============================================================================
# dev:    ./mvnw spring-boot:run -Dspring-boot.run.profiles.active=dev
#         - ddl-auto=create-drop (RECREA schema en cada inicio)
#
# staging: ./mvnw spring-boot:run -Dspring-boot.run.profiles.active=staging
#          - ddl-auto=validate (solo valida, no modifica)
#
# prod:   ./mvnw spring-boot:run -Dspring-boot.run.profiles.active=prod
#         - ddl-auto=none (NO modifica nunca)
#         - flyway.enabled=true (usa migrations SQL)
# =============================================================================