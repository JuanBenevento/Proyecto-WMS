# WMS External Configuration
# Spring Cloud Config Server configuration for externalized configuration

# Application name
spring:
  application:
    name: wms-enterprise

# Config Server (if enabled)
# cloud:
#   config:
#     server:
#       git:
#         uri: https://github.com/juanbenevento/wms-config
#         default-label: main

# Placeholder for external configuration
# In production, use Spring Cloud Config Server or Kubernetes ConfigMaps
application:
  config:
    # Database settings
    database:
      pool:
        hikari:
          maximum-pool-size: 20
          minimum-idle: 5
          connection-timeout: 30000
          idle-timeout: 600000
          max-lifetime: 1800000
    
    # Cache settings
    cache:
      caffeine:
        spec: maximumSize=1000,expireAfterWrite=30m
      # Uncomment for Redis:
      # redis:
      #   time-to-live: 30m
    
    # Multi-tenant settings
    tenant:
      isolation-enabled: true
      rls-enabled: true
    
    # Logging
    logging:
      level:
        root: INFO
        com.juanbenevento.wms: DEBUG