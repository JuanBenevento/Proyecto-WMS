# =============================================================================
# WMS - Production Configuration
# =============================================================================
# Profile: prod - Configuración para entorno de producción
# =============================================================================
# IMPORTANTE: Todas las configuraciones sensibles deben usar variables de entorno
# =============================================================================

# =============================================================================
# Multi-Tenant Schema Isolation - Production Settings
# =============================================================================
# Producción: AISLAMIENTO HABILITADO
# Feature flags para rollout gradual
wms.tenant.isolation.enabled=${WMS_TENANT_ISOLATION_ENABLED:true}
wms.tenant.isolation.rls.enabled=${WMS_TENANT_RLS_ENABLED:true}
wms.tenant.schema.prefix=tenant_

# Logging de auditoría para producción
# Registra cambios de schema para auditoría
logging.level.com.juanbenevento.wms.shared.infrastructure.tenant=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# =============================================================================
# Database Configuration - Production
# =============================================================================
# DDL auto: none - NUNCA modifica el schema automáticamente
# Usa Flyway para todas las migraciones
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway HABILITADO en producción
# Requiere migraciones SQL versionadas
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# =============================================================================
# Connection Pool - Production
# Pool optimizado para producción con múltiples tenants
# =============================================================================
spring.datasource.hikari.initial-size=5
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=WmsHikariPool
spring.datasource.hikari.auto-commit=false

# =============================================================================
# JWT Security - Production
# REQUIERE variable de entorno JWT_SECRET_KEY
# =============================================================================
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

# =============================================================================
# Production Server Configuration
# =============================================================================
server.port=${SERVER_PORT:8080}
server.error.include-message=never
server.error.include-stacktrace=never
server.error.whitelabel.enabled=false

# =============================================================================
# Production Security Headers
# =============================================================================
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# =============================================================================
# Production Monitoring
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.metrics.export.prometheus.enabled=false