# =============================================================================
# WMS - Development Configuration
# =============================================================================
# Profile: dev - Utilizado para desarrollo local
# =============================================================================

# =============================================================================
# Multi-Tenant Schema Isolation - Development Settings
# =============================================================================
# Desarrollo: AISLAMENTO DESHABILITADO por defecto
# Permite desarrollo sin configurar BD multi-tenant
wms.tenant.isolation.enabled=false
wms.tenant.isolation.rls.enabled=false
wms.tenant.schema.prefix=tenant_

# Logging detallado para debugging de aislamiento
logging.level.com.juanbenevento.wms.shared.infrastructure.tenant=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =============================================================================
# Database Configuration - Development
# =============================================================================
# DDL auto: create-drop - Recrea schema en cada inicio
# Útil durante desarrollo activo
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway deshabilitado en desarrollo
# Usa Hibernate para crear tablas
spring.flyway.enabled=false

# =============================================================================
# Connection Pool - Development
# Pool pequeño para desarrollo local
# =============================================================================
spring.datasource.hikari.initial-size=2
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# =============================================================================
# JWT Security - Development
# Key de desarrollo (NO usar en producción)
# =============================================================================
application.security.jwt.secret-key=${JWT_SECRET_KEY:dev-secret-key-minimo-256-bits-para-desarrollo-local}
application.security.jwt.expiration=86400000

# =============================================================================
# Development Server Configuration
# =============================================================================
server.port=8080
server.error.include-message=always
server.error.include-stacktrace=always