# =============================================================================
# WMS - Development Profile
# =============================================================================
# ⚠️ SOLO PARA DESARROLLO LOCAL
# ⚠️ RECREA LA BASE DE DATOS EN CADA INICIO - PIERDE TODOS LOS DATOS
# =============================================================================

# H2 Database para desarrollo local
spring.datasource.url=jdbc:h2:mem:wmsdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT para desarrollo (NO usar en producción)
application.security.jwt.secret-key=dGhpcy1pcy1hLXZhbGlkLWp3dC1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1wdXJwb3Nlcw==
application.security.jwt.expiration=86400000

# Log más verboso en dev
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
