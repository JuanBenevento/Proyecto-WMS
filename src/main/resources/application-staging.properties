# =============================================================================
# WMS - Staging Profile
# =============================================================================
# Ambiente de pre-producción
# - Valida esquema pero no modifica
# - Logs moderados
# =============================================================================

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# =============================================================================
# WMS - Production Profile
# =============================================================================
# ⚠️ PRODUCCIÓN - MÁXIMA SEGURIDAD
# ⚠️ NUNCA MODIFICA EL ESQUEMA
# =============================================================================
spring.config.activate.on-profile=prod

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway para migraciones controladas
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Logging JSON estructurado para ELK
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
