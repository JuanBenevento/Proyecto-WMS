# ==============================================================================
# Test Profile Configuration - Uses Testcontainers (PostgreSQL)
# ==============================================================================
# This profile is designed for use with Testcontainers.
# Tests run against a real PostgreSQL container via Testcontainers.
# Flyway is enabled to run actual migrations.

# Database - These will be overridden by Testcontainers DynamicPropertySource
spring.datasource.url=jdbc:postgresql://localhost:5432/wms_test
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=test
spring.datasource.password=test

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.highlight_sql=false

# SQL Initialization - Flyway handles schema
spring.sql.init.mode=never

# Flyway - Enabled for Testcontainers (uses migrations)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Security
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.juanbenevento.wms=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.test.context=INFO

# Disable external services in tests
spring.kafka.bootstrap-servers=
spring.rabbitmq.host=

# Testcontainers reuse
spring.testcontainers.reuse.enable=true