# ==============================================================================
# Test Profile Configuration
# ==============================================================================
# Uses H2 in-memory database with Hibernate auto-DDL
# Flyway is disabled - schemas are created by Hibernate

# Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable SQL initialization (no Flyway)
spring.sql.init.mode=never

# Disable Flyway completely for tests
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=false

# Security
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.juanbenevento.wms=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Disable external services in tests
spring.kafka.bootstrap-servers=
spring.rabbitmq.host=