<div class="card shadow mb-4">
  <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
    <h4 class="mb-0">🗺️ Mapa Físico del Depósito</h4>
    <button class="btn btn-sm btn-outline-light" (click)="loadMap()">Refrescar</button>
  </div>
  
  <div class="card-body bg-light">
    
    <div class="row g-3">
      <div class="col-md-3 col-sm-6" *ngFor="let loc of locations">
        
        <div class="card location-card border-0 shadow-sm" (click)="showContent(loc)">
          <div class="card-body p-2 text-center">
            
            <h5 class="fw-bold mb-1">{{ loc.locationCode }}</h5>
            
            <span class="badge mb-2" 
                  [ngClass]="{
                    'bg-secondary': loc.zoneType === 'DRY_STORAGE',
                    'bg-info text-dark': loc.zoneType === 'COLD_STORAGE',
                    'bg-primary': loc.zoneType === 'FROZEN_STORAGE',
                    'bg-warning text-dark': loc.zoneType === 'HAZMAT'
                  }">
              {{ loc.zoneType }}
            </span>

            <div class="progress" style="height: 20px;">
              <div 
                class="progress-bar progress-bar-striped progress-bar-animated" 
                [ngClass]="getProgressColor(getOccupancyPercentage(loc))"
                role="progressbar" 
                [style.width.%]="getOccupancyPercentage(loc)">
                {{ getOccupancyPercentage(loc) | number:'1.0-0' }}%
              </div>
            </div>

            <small class="text-muted d-block mt-1">
              {{ loc.currentWeight }}/{{ loc.maxWeight }} kg
            </small>
          </div>
        </div>

      </div>

      <div *ngIf="locations.length === 0" class="col-12 text-center py-5">
        <p class="text-muted">No hay ubicaciones creadas. ¡Crea una abajo!</p>
      </div>
    </div>

  </div>
</div>
