<div class="max-w-3xl mx-auto">
  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
    
    <div class="flex border-b border-slate-200">
      <button type="button" (click)="setMode('ALLOCATE')"
              class="flex-1 py-4 text-sm font-bold uppercase tracking-wider transition-colors border-b-4"
              [ngClass]="mode === 'ALLOCATE' ? 'border-orange-500 text-orange-600 bg-orange-50' : 'border-transparent text-slate-400 hover:text-slate-600'">
        <i class="bi bi-cart4 mr-2"></i> 1. Reservar (Allocate)
      </button>
      <button type="button" (click)="setMode('SHIP')"
              class="flex-1 py-4 text-sm font-bold uppercase tracking-wider transition-colors border-b-4"
              [ngClass]="mode === 'SHIP' ? 'border-red-500 text-red-600 bg-red-50' : 'border-transparent text-slate-400 hover:text-slate-600'">
        <i class="bi bi-truck mr-2"></i> 2. Despachar (Ship)
      </button>
    </div>

    <div class="p-6 md:p-8">
      
      <div *ngIf="mode === 'ALLOCATE'" class="mb-6 p-4 bg-orange-50 text-orange-800 rounded-lg text-sm border border-orange-100 flex items-start gap-3">
        <i class="bi bi-info-circle-fill text-lg mt-0.5"></i>
        <div>
          <strong>Modo Reserva:</strong> El sistema buscará stock disponible siguiendo la regla FEFO (Primero en vencer, primero en salir) y lo marcará como "RESERVADO".
        </div>
      </div>

      <div *ngIf="mode === 'SHIP'" class="mb-6 p-4 bg-red-50 text-red-800 rounded-lg text-sm border border-red-100 flex items-start gap-3">
        <i class="bi bi-exclamation-triangle-fill text-lg mt-0.5"></i>
        <div>
          <strong>Modo Despacho:</strong> Esta acción dará de baja definitiva el stock reservado del inventario. Asegúrese que la carga está en el camión.
        </div>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Producto (SKU)</label>
          <div class="relative">
            <input type="text" formControlName="sku"
                   class="block w-full pl-4 pr-10 py-3 text-lg font-mono font-bold text-slate-900 border-2 border-slate-200 rounded-xl focus:ring-4 focus:bg-white transition-all uppercase"
                   [ngClass]="mode === 'ALLOCATE' ? 'focus:border-orange-500 focus:ring-orange-500/20' : 'focus:border-red-500 focus:ring-red-500/20'"
                   placeholder="SKU a preparar...">
            <i class="bi bi-search absolute right-4 top-4 text-slate-400"></i>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Cantidad a Sacar</label>
          <input type="number" formControlName="quantity" min="1"
                 class="block w-full px-4 py-3 text-lg font-bold text-slate-900 border-2 border-slate-200 rounded-xl focus:ring-4 focus:bg-white transition-all"
                 [ngClass]="mode === 'ALLOCATE' ? 'focus:border-orange-500 focus:ring-orange-500/20' : 'focus:border-red-500 focus:ring-red-500/20'">
        </div>

        <button type="submit" 
                [disabled]="form.invalid || isLoading"
                class="w-full mt-4 py-4 rounded-xl text-white font-bold text-lg shadow-lg transition-all hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed"
                [ngClass]="mode === 'ALLOCATE' 
                  ? 'bg-orange-600 hover:bg-orange-700 shadow-orange-500/30' 
                  : 'bg-red-600 hover:bg-red-700 shadow-red-500/30'">
          <span *ngIf="isLoading" class="animate-pulse">Procesando...</span>
          <span *ngIf="!isLoading">
             {{ mode === 'ALLOCATE' ? 'RESERVAR STOCK' : 'CONFIRMAR SALIDA' }}
          </span>
        </button>

      </form>
    </div>
  </div>
</div>
