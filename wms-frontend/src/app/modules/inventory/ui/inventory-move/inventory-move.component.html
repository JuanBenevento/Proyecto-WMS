<div class="max-w-3xl mx-auto">
  
  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
    <div class="bg-blue-600 px-6 py-4 flex justify-between items-center text-white">
      <h2 class="text-xl font-bold flex items-center gap-2">
        <i class="bi bi-arrows-move text-2xl"></i> Movimientos
      </h2>
      <span class="text-xs font-medium bg-blue-500/50 px-2 py-1 rounded border border-blue-400/30">Interno / Put-Away</span>
    </div>

    <div class="p-6 md:p-8 relative">
      <div class="absolute left-8 top-16 bottom-24 w-0.5 bg-slate-200 hidden md:block z-0"></div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-8 relative z-10">
        
        <div class="bg-slate-50 rounded-xl border border-slate-200 p-5 transition-all focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 shadow-sm">
          <div class="flex justify-between items-start mb-3">
            <label class="flex items-center gap-2 text-xs font-bold text-slate-500 uppercase tracking-wider">
              <span class="h-6 w-6 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center text-xs">1</span>
              Escanear Origen
            </label>
            <span *ngIf="scannedItem" class="text-xs font-bold text-green-600 bg-green-100 px-2 py-0.5 rounded">DETECTADO</span>
          </div>

          <div class="relative">
            <input type="text" formControlName="lpn" (blur)="onScanLpn()"
                   class="block w-full pl-4 pr-12 py-3 text-lg font-mono font-bold text-slate-800 bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-transparent uppercase placeholder:text-slate-300 placeholder:normal-case"
                   placeholder="Escanear LPN...">
            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
              <i class="bi bi-qr-code text-slate-400 text-xl"></i>
            </div>
          </div>

          <div *ngIf="scannedItem" class="mt-4 pt-3 border-t border-slate-200 grid grid-cols-2 gap-4 animate-in fade-in slide-in-from-top-2">
            <div>
              <span class="text-[10px] uppercase text-slate-400 font-bold">Producto</span>
              <p class="text-sm font-bold text-slate-700 truncate">{{ scannedItem.productName }}</p>
              <p class="text-xs font-mono text-slate-500">{{ scannedItem.sku }}</p>
            </div>
            <div class="text-right">
              <span class="text-[10px] uppercase text-slate-400 font-bold">Actual</span>
              <p class="text-sm font-bold text-red-600 flex items-center justify-end gap-1">
                <i class="bi bi-geo-alt-fill"></i> {{ scannedItem.locationCode }}
              </p>
              <p class="text-xs text-slate-500">{{ scannedItem.quantity }} Unidades</p>
            </div>
          </div>
        </div>

        <div class="flex justify-center -my-6 relative z-20">
          <div class="bg-white rounded-full p-2 shadow-sm border border-slate-100">
            <i class="bi bi-arrow-down-circle-fill text-3xl text-blue-500"></i>
          </div>
        </div>

        <div class="bg-slate-50 rounded-xl border border-slate-200 p-5 transition-all focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 shadow-sm">
          <div class="flex justify-between items-start mb-3">
            <label class="flex items-center gap-2 text-xs font-bold text-slate-500 uppercase tracking-wider">
              <span class="h-6 w-6 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center text-xs">2</span>
              Ubicación Destino
            </label>
            
            <button type="button" *ngIf="suggestion" (click)="applySuggestion()"
                    class="group flex items-center gap-2 bg-yellow-50 text-yellow-700 border border-yellow-200 px-3 py-1 rounded-full hover:bg-yellow-100 transition-colors cursor-pointer animate-pulse">
              <i class="bi bi-lightbulb-fill text-yellow-500"></i>
              <span class="text-xs font-bold">Sugerido: {{ suggestion }}</span>
            </button>
          </div>

          <div class="relative">
            <input type="text" formControlName="targetLocationCode"
                   class="block w-full pl-4 pr-12 py-3 text-lg font-mono font-bold text-slate-800 bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-transparent uppercase placeholder:text-slate-300"
                   placeholder="Escanear Ubicación...">
            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
              <i class="bi bi-geo-fill text-slate-400 text-xl"></i>
            </div>
          </div>
        </div>

        <div>
           <label class="text-xs text-slate-400 font-bold uppercase ml-1">Motivo (Opcional)</label>
           <input type="text" formControlName="reason" 
                  class="mt-1 block w-full px-4 py-2 text-sm text-slate-600 border-b-2 border-slate-200 bg-transparent focus:border-blue-500 focus:outline-none transition-colors" 
                  placeholder="Ej: Reorganización, Rotura...">
        </div>

        <button type="submit" 
                [disabled]="form.invalid || isLoading"
                class="w-full rounded-xl bg-blue-600 py-4 text-white font-bold text-lg shadow-lg shadow-blue-500/30 hover:bg-blue-700 active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isLoading ? 'MOVIENDO...' : 'CONFIRMAR MOVIMIENTO' }}
        </button>

      </form>
    </div>
  </div>
</div>
