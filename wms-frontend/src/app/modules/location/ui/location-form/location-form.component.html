<div class="min-h-screen bg-gray-50/50 p-6 flex justify-center">
  <div class="w-full max-w-3xl">
    
    <div class="mb-6">
      <nav class="text-sm font-medium text-gray-500 mb-2">
        <a routerLink="/admin/locations" class="hover:text-indigo-600">Ubicaciones</a> / 
        <span class="text-gray-900">{{ isEditMode ? 'Editar' : 'Crear' }}</span>
      </nav>
      <h1 class="text-2xl font-bold text-gray-900">{{ isEditMode ? 'Editar Capacidades' : 'Nueva Ubicación' }}</h1>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 sm:p-8">
        <h3 class="text-lg font-semibold text-gray-900 mb-4 border-b border-gray-100 pb-2">Identificación</h3>
        
        <div class="grid grid-cols-3 gap-4 mb-4">
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Pasillo</label>
            <input type="text" formControlName="aislePart" maxlength="2" (input)="updatePreview()"
                   class="block w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 py-2 px-3 uppercase text-center font-bold"
                   placeholder="A">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Rack</label>
            <input type="text" formControlName="rackPart" maxlength="2" (input)="updatePreview()"
                   class="block w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 py-2 px-3 text-center font-bold"
                   placeholder="01">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nivel</label>
            <input type="text" formControlName="levelPart" maxlength="2" (input)="updatePreview()"
                   class="block w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 py-2 px-3 text-center font-bold"
                   placeholder="1">
          </div>
        </div>

        <div class="text-center bg-gray-50 p-3 rounded-lg border border-dashed border-gray-300 mb-4">
          <span class="text-xs text-gray-400 block mb-1">CÓDIGO GENERADO</span>
          <span class="text-xl font-mono font-black text-indigo-700 tracking-wider">
            {{ generatedCode || '---' }}
          </span>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Zona</label>
          <select formControlName="zoneType" class="block w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 py-2.5 px-3">
            <option value="DRY_STORAGE">Almacenamiento Seco</option>
            <option value="COLD_STORAGE">Refrigerado</option>
            <option value="FROZEN">Congelado</option>
            <option value="HAZARDOUS">Materiales Peligrosos</option>
          </select>
        </div>
      </div>

      <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 sm:p-8">
        <h3 class="text-lg font-semibold text-gray-900 mb-4 border-b border-gray-100 pb-2">Límites de Capacidad</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Peso Máximo (kg) <span class="text-red-500">*</span></label>
            <input type="number" formControlName="maxWeight" class="block w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 py-2.5 px-3">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Volumen Máximo (cm³) <span class="text-red-500">*</span></label>
            <input type="number" formControlName="maxVolume" class="block w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 py-2.5 px-3">
            <p class="text-xs text-gray-400 mt-1">Ej: 1m x 1m x 1m = 1,000,000 cm³</p>
          </div>
        </div>
      </div>

      <div class="flex justify-end gap-4">
        <button type="button" routerLink="/admin/locations" class="px-5 py-2.5 bg-white border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50">Cancelar</button>
        <button type="submit" [disabled]="form.invalid" class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 disabled:opacity-50">
          {{ isEditMode ? 'Guardar Cambios' : 'Crear Ubicación' }}
        </button>
      </div>

    </form>
  </div>
</div>
