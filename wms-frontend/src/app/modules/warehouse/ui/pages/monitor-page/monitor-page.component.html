<div class="flex h-screen bg-gray-100 overflow-hidden font-sans relative">

    <div id="monitor-container" class="flex-1 relative bg-gray-100 w-full h-full shadow-inner">
        <canvas id="monitorCanvas"></canvas>
    </div>

    <div class="absolute top-4 left-6 bg-white/90 backdrop-blur px-4 py-3 rounded-xl shadow-lg border border-gray-200 flex items-center gap-4 z-10">
        <div>
            <h1 class="text-sm font-black text-gray-800 uppercase tracking-wide">Monitor de Planta</h1>
            <p class="text-[10px] text-gray-500 font-mono">
                Actualizado: {{ lastUpdate | date:'mediumTime' }}
            </p>
        </div>
        <button (click)="refreshHeatmap()" 
                class="w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center hover:bg-indigo-100 transition-colors active:scale-95" 
                title="Refrescar Datos">
            <i class="bi bi-arrow-clockwise"></i>
        </button>
    </div>

    <div class="absolute bottom-6 left-6 bg-white/90 backdrop-blur px-4 py-3 rounded-xl shadow-lg border border-gray-200 z-10">
        <div class="text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-wider">Referencias</div>
        <div class="flex flex-col gap-2">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-green-100 border border-green-600 shadow-sm"></div>
                <span class="text-xs text-gray-600 font-medium">Disponible</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-yellow-100 border border-yellow-600 shadow-sm"></div>
                <span class="text-xs text-gray-600 font-medium">Parcial</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-red-100 border border-red-600 shadow-sm"></div>
                <span class="text-xs text-gray-600 font-medium">Lleno / Saturado</span>
            </div>
             <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-gray-100 border border-gray-400 shadow-sm"></div>
                <span class="text-xs text-gray-400 font-medium">Sin Conexión</span>
            </div>
        </div>
    </div>

    <div *ngIf="isLoading" class="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-50">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-100 border-l-indigo-600"></div>
        <p class="mt-3 text-xs font-bold text-indigo-600 tracking-wide animate-pulse">CARGANDO MAPA...</p>
    </div>

</div>
