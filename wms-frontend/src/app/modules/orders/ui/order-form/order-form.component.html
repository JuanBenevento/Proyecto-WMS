<div class="min-h-screen bg-gray-50/50 p-6">
  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="flex items-center gap-4 mb-8">
      <button routerLink="/orders" class="p-2 hover:bg-gray-200 rounded-lg transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Nueva Orden</h1>
        <p class="text-sm text-gray-500">Crea una nueva orden de pedido.</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Datos del Cliente -->
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Información del Cliente</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ID Cliente *</label>
            <input type="text" formControlName="customerId"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                   placeholder="CUST-001">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Cliente *</label>
            <input type="text" formControlName="customerName"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                   placeholder="Cliente ejemplo">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" formControlName="customerEmail"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                   placeholder="cliente@ejemplo.com">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Prioridad</label>
            <select formControlName="priority"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
              <option *ngFor="let opt of priorityOptions" [value]="opt.value">{{ opt.label }}</option>
            </select>
          </div>
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Dirección de Envío *</label>
            <input type="text" formControlName="shippingAddress"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                   placeholder="Calle 123, Ciudad, País">
          </div>
        </div>
      </div>

      <!-- Datos de la Orden -->
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Datos de la Orden</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Warehouse ID *</label>
            <input type="text" formControlName="warehouseId"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                   placeholder="WH-001">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Envío Prometida</label>
            <input type="date" formControlName="promisedShipDate"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Entrega Prometida</label>
            <input type="date" formControlName="promisedDeliveryDate"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Notas</label>
            <textarea formControlName="notes" rows="2"
                      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                      placeholder="Notas adicionales..."></textarea>
          </div>
        </div>
      </div>

      <!-- Líneas de la Orden -->
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-semibold text-gray-900">Líneas de la Orden</h2>
          <button type="button" (click)="addLine()"
                  class="inline-flex items-center gap-1 px-3 py-1.5 text-sm font-medium text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            Agregar Línea
          </button>
        </div>

        <div formArrayName="lines" class="space-y-4">
          <div *ngFor="let line of lines.controls; let i = index" [formGroupName]="i" 
               class="flex gap-4 items-start p-4 bg-gray-50 rounded-lg border border-gray-200">
            <div class="flex-1 grid grid-cols-1 sm:grid-cols-4 gap-4">
              <div>
                <label class="block text-xs text-gray-500 mb-1">SKU *</label>
                <input type="text" formControlName="productSku"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                       placeholder="SKU-001">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1">Cantidad *</label>
                <input type="number" formControlName="requestedQuantity" min="1"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1">Fecha Entrega</label>
                <input type="date" formControlName="promisedDeliveryDate"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1">Notas</label>
                <input type="text" formControlName="notes"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                       placeholder="Notas...">
              </div>
            </div>
            <button type="button" (click)="removeLine(i)" [disabled]="lines.length <= 1"
                    class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex justify-end gap-4">
        <button type="button" routerLink="/orders"
                class="px-6 py-2.5 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 transition-colors">
          Cancelar
        </button>
        <button type="submit" [disabled]="loading"
                class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg transition-colors disabled:opacity-50">
          <span *ngIf="loading" class="animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2 inline-block"></span>
          {{ loading ? 'Creando...' : 'Crear Orden' }}
        </button>
      </div>
    </form>
  </div>
</div>
