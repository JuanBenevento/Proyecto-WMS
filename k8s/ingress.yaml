# WMS Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wms-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  rules:
  - host: wms.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: wms-backend
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wms-frontend
            port:
              number: 80