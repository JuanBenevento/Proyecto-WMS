# WMS Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wms-backend
  labels:
    app: wms-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wms-backend
  template:
    metadata:
      labels:
        app: wms-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/juanbenevento/wms-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: wms-config
              key: spring.profiles.active
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            secretKeyRef:
              name: wms-secrets
              key: database.url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: wms-secrets
              key: database.username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wms-secrets
              key: database.password
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: wms-secrets
              key: jwt.secret
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wms-backend
spec:
  selector:
    app: wms-backend
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: wms-backend-lb
spec:
  selector:
    app: wms-backend
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer